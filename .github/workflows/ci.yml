name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ts:
    name: TypeScript (typecheck + vitest + grammar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test # includes the cross-language grammar fixture test (TS side)

  python:
    name: Redactor (pytest + cross-language grammar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Pure-logic + cross-language tests (no Presidio needed)
        working-directory: services/redactor
        run: |
          python -m venv .venv
          .venv/bin/pip install pytest pydantic
          .venv/bin/python -m pytest tests/test_placeholder_crosslang.py tests/test_redactor_logic.py tests/test_regex_safety.py -q
      # The @presidio-marked German-detection tests run in the redactor image job below.

  e2e:
    name: E2E happy path (redact -> mock -> unredact, no raw PII)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot stack + smoke
        run: |
          cp .env.example .env
          ./deploy.sh dev --build --seed
      # deploy.sh's verify step runs infra/smoke.mjs: sends a German name + IBAN,
      # asserts the caller gets real values back AND the mock received no raw PII.
      # It fails the job on any invariant violation.

  load-smoke:
    name: Load smoke (50 users, 3m hold)
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - name: Shortened chat load run with threshold gates
        run: |
          cp .env.example .env
          ./deploy.sh dev --build --seed | tee deploy.out
          export TENANT_ID=$(grep -o 'demo tenant: .*' deploy.out | awk '{print $3}')
          export API_KEY=$(grep -o 'demo API key (save it): .*' deploy.out | awk '{print $6}')
          HOLD=3m k6 run tests/load/chat-users.ts
