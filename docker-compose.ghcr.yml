# Pull-only stack for Coolify (or any host) — uses prebuilt GHCR images instead
# of building on-box. Point Coolify's compose path at THIS file.
#
# Images are published by .github/workflows/build-images.yml on every push to
# main. Make the GHCR packages public (GitHub → repo → Packages → each package →
# Package settings → Change visibility → Public), or add GHCR registry
# credentials in Coolify so it can pull private images.
#
# Set IMAGE_TAG to pin a specific build (default: latest).

x-restart: &restart
  restart: unless-stopped

x-images:
  gateway: &gateway_image ghcr.io/carltonbags/datenschranke-gateway:${IMAGE_TAG:-latest}

services:
  postgres:
    image: postgres:16
    <<: *restart
    environment:
      POSTGRES_DB: gdpr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gdpr"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    <<: *restart
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redactor:
    image: ghcr.io/carltonbags/datenschranke-redactor:${IMAGE_TAG:-latest}
    <<: *restart
    environment:
      LOG_LEVEL: info
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      start_period: 150s
      retries: 5

  # One-shot migrations (superuser). Exits when done; gateway waits for it.
  migrate:
    image: *gateway_image
    command: ["node", "/repo/infra/migrations/migrate.mjs"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/gdpr
      GATEWAY_DB_PASSWORD: ${GATEWAY_DB_PASSWORD:?set GATEWAY_DB_PASSWORD}

  gateway:
    image: *gateway_image
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redactor:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      GATEWAY_PORT: 8080
      GATEWAY_DATABASE_URL: postgres://gateway:${GATEWAY_DB_PASSWORD:?set GATEWAY_DB_PASSWORD}@postgres:5432/gdpr
      REDIS_URL: redis://redis:6379
      REDACTOR_URL: http://redactor:8000
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:?set MASTER_ENCRYPTION_KEY}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # No host port publish: Coolify's Traefik routes to this via the domain you
    # assign (targets the exposed container port). Publishing to the host collides
    # with other Coolify apps. Set GATEWAY_HOST_PORT only for bare `docker compose`.
    expose:
      - "8080"

  web:
    image: ghcr.io/carltonbags/datenschranke-web:${IMAGE_TAG:-latest}
    <<: *restart
    depends_on:
      - gateway
    environment:
      GATEWAY_URL: http://gateway:8080
      DEMO_TENANT_ID: ${DEMO_TENANT_ID:-}
    # Assign your domain to THIS service in Coolify (targets port 3000). No host
    # publish — avoids cross-app port collisions on the box.
    expose:
      - "3000"

volumes:
  pgdata:
